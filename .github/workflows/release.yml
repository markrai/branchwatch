name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  PROJECT_PATH: BranchWatch/BranchWatch.csproj
  SOLUTION_PATH: BranchWatch.sln

jobs:
  release:
    name: Release Windows Artifacts
    runs-on: windows-latest

    steps:
      - name: Validate tag
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must match vMAJOR.MINOR.PATCH, for example v1.1.0. Actual: $tag"
          }

          $version = $tag.Substring(1)
          Add-Content -Path $env:GITHUB_ENV -Value "RELEASE_VERSION=$version"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Test
        run: dotnet test $env:SOLUTION_PATH -c $env:CONFIGURATION

      - name: Publish and zip assets
        run: |
          $distDir = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item -ItemType Directory -Path $distDir -Force | Out-Null

          foreach ($rid in @("win-x64", "win-arm64")) {
            $publishDir = Join-Path $env:RUNNER_TEMP "branchwatch-publish-$rid"

            dotnet publish $env:PROJECT_PATH `
              -c $env:CONFIGURATION `
              -r $rid `
              --self-contained true `
              -p:PublishSingleFile=true `
              -p:IncludeNativeLibrariesForSelfExtract=true `
              -p:DebugType=None `
              -p:DebugSymbols=false `
              -p:Version=$env:RELEASE_VERSION `
              -p:AssemblyVersion="$env:RELEASE_VERSION.0" `
              -p:FileVersion="$env:RELEASE_VERSION.0" `
              -o $publishDir

            $exePath = Join-Path $publishDir "BranchWatch.exe"
            if (-not (Test-Path $exePath)) {
              throw "Expected publish output not found: $exePath"
            }

            $zipName = "BranchWatch-{0}.zip" -f $rid
            $zipPath = Join-Path $distDir $zipName
            Compress-Archive -Path $exePath -DestinationPath $zipPath -Force
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
